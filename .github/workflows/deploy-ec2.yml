name: EC2 Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      gateway_image: ${{ steps.meta.outputs.gateway_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "gateway_image=${{ env.REGISTRY }}/${OWNER}/${REPO}-gateway:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.gateway_image }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Copy Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/${{ secrets.EC2_USER }}/api-gateway

      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          GATEWAY_IMAGE: ${{ needs.build-and-push.outputs.gateway_image }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GATEWAY_IMAGE,ADMIN_SECRET,PG_PASSWORD,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/api-gateway

            # Configure Docker environment
            cat > .env <<EOF
            GATEWAY_IMAGE=${GATEWAY_IMAGE}
            ADMIN_SECRET=${ADMIN_SECRET}
            PG_PASSWORD=${PG_PASSWORD}
            EOF

            # Login to repository and pull the latest assets
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker compose -f docker-compose.prod.yml pull

            # Boot persistence layers and wait for init
            docker compose -f docker-compose.prod.yml up -d postgres redis
            echo "Waiting 10s to ensure databases are responsive..."
            sleep 10

            # Execute database migrations
            docker compose -f docker-compose.prod.yml run --rm gateway npm run migrate:prod

            # Spin up Gateway and Caddy
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Tidy up the old unused container artifacts
            docker image prune --all --force --filter "until=168h"
