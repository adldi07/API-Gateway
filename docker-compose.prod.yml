version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: api_gateway
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gateway -d api_gateway']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: ${GATEWAY_IMAGE}
    restart: unless-stopped
    # Removed ports 3001:3001 so it's only accessible internally via Caddy
    environment:
      PORT: 3001
      NODE_ENV: production
      ADMIN_SECRET: ${ADMIN_SECRET}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: gateway
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DATABASE: api_gateway
      REDIS_URL: redis://redis:6379
      REDIS_FAIL_MODE: open
      BATCH_FLUSH_INTERVAL_MS: 5000
      BATCH_MAX_SIZE: 100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway:
        condition: service_started

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config: